<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Piggy: PSU Puzzle - Приключения в кампусе</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- ГЛАВНЫЙ КОНТЕЙНЕР -->
    <div id="main-menu" class="main-container">
        
        <!-- ФОНОВАЯ РАМКА (Под всем контентом) -->
        <img src="./details/Details_Page/Rectangle1.png" alt="" class="main-frame-bg" onerror="this.style.display='none'">

        <!-- 1. НАДПИСЬ (Будет ровно в 10px от верха благодаря CSS) -->
        <div class="title-block">
            <h1>Smart Piggy: PSU Puzzle</h1>
        </div>

        <!-- 2. БЛОК С ПЕРСОНАЖЕМ (Будет строго по центру экрана) -->
        <div class="character-block">
            <img src="Rectangle2.png" alt="" class="inner-frame-bg" onerror="this.style.display='none'">

            <div class="character-wrapper" id="menu-character">
                <img src="./details/Prime.png" alt="Персонаж" class="character-img" onerror="this.style.display='none'">
                
                <div class="speech-bubble" id="menu-speech">
                    <img src="./details/я готов.png" alt="Я готов!" class="speech-img" onerror="this.style.display='none'">
                    <span class="speech-text-fallback" style="display: none;">Я ГОТОВ!</span> 
                </div>
            </div>
        </div>

        <!-- 3. КНОПКИ (Будут прижаты к низу, под блоком с персом) -->
        <div class="buttons-block">
            <button class="menu-btn btn-play" onclick="window.location.href='levels-carousel.html'" title="Играть">
                <img src="./details/Играть.png" alt="Играть" onerror="this.style.display='none'; this.parentNode.innerText='ИГРАТЬ'">
            </button>
            
            <button class="menu-btn btn-settings" onclick="openScreen('settings')" title="Настройки">
                <img src="./details/НАСТРОЙКИ.png" alt="Настройки" onerror="this.style.display='none'; this.parentNode.innerText='⚙ НАСТРОЙКИ'">
            </button>
            
            <button class="menu-btn btn-about" onclick="openScreen('about')" title="О нас">
                <img src="./details/О НАС.png" alt="О нас" onerror="this.style.display='none'; this.parentNode.innerText='ℹ О НАС'">
            </button>
        </div>

    </div>

    <!-- ЭКРАН НАСТРОЕК -->
    <div class="screen" id="settings-screen">
        <div class="screen-content">
            <h2>⚙ НАСТРОЙКИ</h2>
            <div class="settings-panel">
                <div class="setting-item">
                    <label for="music-volume">🔊 Громкость музыки</label>
                    <input type="range" id="music-volume" min="0" max="100" value="50">
                    <span id="music-volume-value">50%</span>
                </div>
                <div class="setting-item">
                    <label for="sfx-volume">🔉 Громкость эффектов</label>
                    <input type="range" id="sfx-volume" min="0" max="100" value="70">
                    <span id="sfx-volume-value">70%</span>
                </div>
                <div class="setting-item">
                    <label for="dark-theme">🌙 Тёмная тема</label>
                    <input type="checkbox" id="dark-theme" onchange="toggleDarkTheme()">
                </div>
                <div class="setting-item">
                    <label for="animations-enabled">✨ Анимации</label>
                    <input type="checkbox" id="animations-enabled" checked onchange="toggleAnimations()">
                </div>
                <button class="reset-progress-btn" onclick="resetProgress()">🗑 Сбросить прогресс</button>
            </div>
            <button class="back-btn" onclick="closeScreens()">Назад</button>
        </div>
    </div>

    <!-- ЭКРАН "О НАС" -->
    <div class="screen" id="about-screen">
        <div class="screen-content">
            <h2>О НАС</h2>
            <div class="about-panel">
                <div class="about-character"></div>
                <p><strong>Smart Piggy: PSU Puzzle</strong> — образовательная игра-приключение.</p>
                <p>Помоги поросёнку пройти все испытания кампуса!</p>
                <p class="about-version">Версия 1.0 | Учебный проект 2026</p>
            </div>
            <button class="back-btn" onclick="closeScreens()">Назад</button>
        </div>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
